name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: sudo apt-get update
      - run: sudo apt-get install -y ninja-build libgtk-3-dev libpulse-dev unzip cmake clang pkg-config
      - run: flutter create --platforms=linux --project-name example_app example
      - run: flutter pub add 'speech_to_text_linux:{"path":"../"}'
        working-directory: example
      - run: flutter build linux --debug
        working-directory: example
